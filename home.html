<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Blink — 설렘,스물</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Noto+Serif+KR:wght@400;600&display=swap" rel="stylesheet">
<meta name="theme-color" content="#FF6B9D">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<style>
:root{
  --pink:#FF6B9D;--pink-light:#FFB3CC;--pink-pale:#FFF0F5;
  --purple:#8B5CF6;--purple-light:#C4B5FD;--purple-pale:#F5F3FF;
  --peach:#FFCBA4;--bg:#FFF8FC;--card:#FFFFFF;
  --text:#1C0A16;--muted:#9B6B80;--border:rgba(255,107,157,0.15);
  --shadow:0 4px 24px rgba(255,107,157,0.12);
  --nav:70px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Gowun Dodum',sans-serif;background:var(--bg);min-height:100vh;color:var(--text);overflow-x:hidden;padding-bottom:var(--nav);}

/* ── 헤더 ── */
.hd{position:fixed;top:0;left:0;right:0;height:56px;background:rgba(255,248,252,.97);backdrop-filter:blur(12px);z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 18px;border-bottom:1px solid var(--border);}
.hd-logo{font-size:20px;font-weight:800;background:linear-gradient(135deg,#FF6B9D,#8B5CF6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;font-family:'Noto Serif KR',serif;letter-spacing:-0.5px;}
.hd-icons{display:flex;gap:8px;}
.hd-btn{width:34px;height:34px;border-radius:50%;border:none;background:var(--pink-pale);color:var(--pink);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;position:relative;}
.hd-badge{position:absolute;top:-3px;right:-3px;min-width:16px;height:16px;background:var(--pink);border-radius:8px;font-size:9px;color:white;display:flex;align-items:center;justify-content:center;font-weight:700;padding:0 3px;}

/* ── 탭 바 ── */
.tab-bar{position:fixed;top:56px;left:0;right:0;z-index:99;background:rgba(255,248,252,.97);backdrop-filter:blur(8px);border-bottom:1px solid var(--border);display:flex;padding:0 18px;}
.tab-item{padding:12px 16px;font-size:14px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2.5px solid transparent;transition:all .2s;font-family:'Gowun Dodum',sans-serif;border:none;background:none;}
.tab-item.active{color:var(--pink);border-bottom-color:var(--pink);}

/* ── 메인 ── */
.main{padding:110px 0 20px;}

/* ── 카운트다운 배너 ── */
.banner{margin:0 16px 16px;background:linear-gradient(135deg,var(--pink),var(--purple));border-radius:16px;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;color:white;}
.banner-left{}
.banner-label{font-size:11px;opacity:.85;margin-bottom:3px;}
.banner-title{font-size:15px;font-weight:700;}
.banner-count{text-align:center;}
.countdown{font-size:22px;font-weight:800;letter-spacing:2px;font-family:monospace;}
.countdown-label{font-size:10px;opacity:.8;margin-top:2px;}

/* ── 섹션 ── */
.section{margin:0 16px 20px;}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.section-title{font-size:16px;font-weight:700;color:var(--text);}
.section-count{font-size:12px;color:var(--muted);background:var(--pink-pale);padding:3px 10px;border-radius:50px;border:1px solid var(--border);}

/* ── 로딩 ── */
.loading{display:none;text-align:center;padding:60px 20px;}
.loading.on{display:block;}
.lh-wrap{display:flex;justify-content:center;gap:8px;margin-bottom:14px;}
.lh{width:12px;height:12px;background:var(--pink);border-radius:50% 50% 50% 0/60% 60% 40% 40%;transform:rotate(-45deg);animation:hb 1.2s ease-in-out infinite;}
.lh:nth-child(2){animation-delay:.2s}.lh:nth-child(3){animation-delay:.4s}
@keyframes hb{0%,80%,100%{transform:rotate(-45deg) scale(.8);opacity:.4}40%{transform:rotate(-45deg) scale(1.3);opacity:1}}
.loading-txt{color:var(--muted);font-size:13px;}

/* ── 프로필 카드 ── */
.card-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.pcard{background:var(--card);border-radius:18px;border:1px solid var(--border);overflow:hidden;transition:transform .2s,box-shadow .2s;animation:fadeUp .35s ease both;}
.pcard:hover{transform:translateY(-3px);box-shadow:var(--shadow);}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

.pcard-photo{width:100%;height:180px;position:relative;overflow:hidden;background:linear-gradient(135deg,var(--pink-pale),var(--purple-pale));}
.pcard-photo img{width:100%;height:100%;object-fit:cover;transition:transform .4s;}
.pcard:hover .pcard-photo img{transform:scale(1.05);}
.pcard-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:48px;}
.pcard-type{position:absolute;top:8px;left:8px;background:rgba(255,255,255,.92);border-radius:50px;padding:3px 8px;font-size:10px;color:var(--pink);font-weight:700;border:1px solid var(--pink-light);}

.pcard-body{padding:12px;}
.pcard-name{font-size:15px;font-weight:700;color:var(--text);margin-bottom:2px;font-family:'Noto Serif KR',serif;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pcard-info{font-size:11px;color:var(--muted);margin-bottom:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pcard-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px;}
.ptag{font-size:10px;padding:2px 7px;border-radius:50px;background:var(--pink-pale);color:var(--pink);border:1px solid var(--pink-light);}
.ptag.purple{background:var(--purple-pale);color:var(--purple);border-color:var(--purple-light);}
.pcard-btns{display:flex;gap:6px;}
.btn-skip{flex:1;padding:8px 0;border-radius:50px;border:1px solid #ffcccc;background:white;color:#f44336;font-size:12px;cursor:pointer;font-family:'Gowun Dodum',sans-serif;transition:all .15s;}
.btn-skip:active{background:#fff5f5;}
.btn-like{flex:2;padding:8px 0;border-radius:50px;border:none;background:linear-gradient(135deg,var(--pink),var(--purple));color:white;font-size:12px;font-weight:700;cursor:pointer;font-family:'Gowun Dodum',sans-serif;transition:all .15s;}
.btn-like:active{opacity:.85;}

/* ── 더보기 ── */
.more-wrap{text-align:center;margin-top:16px;}
.more-btn{background:white;border:1.5px solid var(--pink-light);color:var(--pink);border-radius:50px;padding:11px 32px;font-size:13px;font-family:'Gowun Dodum',sans-serif;cursor:pointer;transition:all .2s;}
.more-btn:hover{background:var(--pink-pale);}
.more-btn:disabled{opacity:.5;cursor:not-allowed;}

/* ── 빈 상태 ── */
.empty{display:none;text-align:center;padding:60px 20px;}
.empty.on{display:block;}
.empty-emoji{font-size:52px;margin-bottom:14px;}
.empty-title{font-size:17px;font-weight:700;color:var(--text);margin-bottom:6px;}
.empty-sub{font-size:13px;color:var(--muted);line-height:1.6;}

/* ── 검토중 배너 ── */
.review-wrap{margin:16px;background:linear-gradient(135deg,var(--pink-pale),var(--purple-pale));border-radius:16px;border:1px solid var(--border);padding:28px 20px;text-align:center;}
.review-emoji{font-size:44px;margin-bottom:12px;}
.review-title{font-size:17px;font-weight:700;color:var(--text);margin-bottom:6px;}
.review-sub{font-size:13px;color:var(--muted);line-height:1.7;}

/* ── 매칭 팝업 ── */
.match-bg{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.6);align-items:center;justify-content:center;backdrop-filter:blur(4px);}
.match-bg.on{display:flex;}
.match-box{background:white;border-radius:26px;padding:32px 24px;text-align:center;max-width:300px;width:88%;animation:popIn .4s cubic-bezier(.34,1.56,.64,1);}
@keyframes popIn{from{transform:scale(.7);opacity:0}to{transform:scale(1);opacity:1}}
.match-emoji{font-size:52px;margin-bottom:10px;}
.match-title{font-size:22px;font-weight:800;background:linear-gradient(135deg,var(--pink),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:6px;}
.match-sub{font-size:13px;color:var(--muted);margin-bottom:20px;line-height:1.6;}
.match-btn-chat{width:100%;padding:13px;border-radius:50px;border:none;background:linear-gradient(135deg,var(--pink),var(--purple));color:white;font-size:14px;font-weight:700;cursor:pointer;font-family:'Gowun Dodum',sans-serif;margin-bottom:8px;}
.match-btn-later{width:100%;padding:13px;border-radius:50px;border:1.5px solid var(--border);background:none;color:var(--muted);font-size:14px;cursor:pointer;font-family:'Gowun Dodum',sans-serif;}

/* ── 네비 ── */
.nav{position:fixed;bottom:0;left:0;right:0;height:var(--nav);background:rgba(255,248,252,.97);backdrop-filter:blur(12px);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-around;padding-bottom:env(safe-area-inset-bottom);z-index:100;}
.nv{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 14px;border:none;background:none;cursor:pointer;color:var(--muted);font-size:10px;font-family:'Gowun Dodum',sans-serif;transition:color .2s;}
.nv.on{color:var(--pink);}
.nv-icon{font-size:21px;}
.nv-badge{position:absolute;top:2px;right:8px;min-width:14px;height:14px;background:var(--pink);border-radius:50px;font-size:9px;color:white;display:flex;align-items:center;justify-content:center;font-weight:700;padding:0 3px;}
.nv{position:relative;}

/* 슬라이드 이미지 */
.slide-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity .3s;}
.slide-img.active{opacity:1;}
.pdot-wrap{position:absolute;bottom:6px;left:50%;transform:translateX(-50%);display:flex;gap:4px;z-index:2;}
.pdot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.5);border:none;padding:0;cursor:pointer;transition:all .2s;}
.pdot.active{background:white;transform:scale(1.3);}

@media(min-width:480px){.card-grid{grid-template-columns:repeat(3,1fr);}}
</style>
</head>
<body>

<!-- 헤더 -->
<div class="hd">
  <div class="hd-logo">Blink ✨</div>
  <div class="hd-icons">
    <button class="hd-btn" onclick="location.href='likes.html'" title="호감목록">💗</button>
    <button class="hd-btn" onclick="location.href='chat.html'" title="채팅">
      💬<span class="hd-badge" id="chatBadge" style="display:none">0</span>
    </button>
    <button class="hd-btn" onclick="location.href='profile.html'" title="프로필">👤</button>
  </div>
</div>

<!-- 탭 바 -->
<div class="tab-bar">
  <button class="tab-item active" id="tabAll" onclick="switchTab('all')">전체</button>
  <button class="tab-item" id="tabDate" onclick="switchTab('date')">💑 소개팅</button>
  <button class="tab-item" id="tabMeet" onclick="switchTab('meet')">🎉 미팅</button>
</div>

<!-- 메인 -->
<div class="main" id="mainContent">

  <!-- 카운트다운 배너 -->
  <div class="banner">
    <div class="banner-left">
      <div class="banner-label">매일 밤 10시 업데이트</div>
      <div class="banner-title">오늘의 새로운 인연 💕</div>
    </div>
    <div class="banner-count">
      <div class="countdown" id="countdown">--:--:--</div>
      <div class="countdown-label">다음 업데이트까지</div>
    </div>
  </div>

  <!-- 로딩 -->
  <div class="loading on" id="loadingWrap">
    <div class="lh-wrap"><div class="lh"></div><div class="lh"></div><div class="lh"></div></div>
    <p class="loading-txt">오늘의 인연을 찾고 있어요...</p>
  </div>

  <!-- 검토중 -->
  <div id="reviewWrap" style="display:none">
    <div class="review-wrap">
      <div class="review-emoji">⏳</div>
      <div class="review-title">프로필 검토 중이에요</div>
      <div class="review-sub">관리자가 프로필을 확인하고 있어요<br>승인 후 상대방 카드를 볼 수 있어요 💌<br><br>프로필이 비어있다면 먼저 완성해주세요!</div>
    </div>
  </div>

  <!-- 카드 섹션 -->
  <div class="section" id="cardSection" style="display:none">
    <div class="section-header">
      <div class="section-title" id="sectionTitle">오늘의 인연 💕</div>
      <div class="section-count" id="sectionCount"></div>
    </div>
    <div class="card-grid" id="cardGrid"></div>
    <div class="more-wrap" id="moreWrap" style="display:none">
      <button class="more-btn" id="moreBtn" onclick="showMore()">💌 더 많은 인연 보기</button>
    </div>
  </div>

  <!-- 빈 상태 -->
  <div class="empty" id="emptyState">
    <div class="empty-emoji">🌙</div>
    <div class="empty-title">오늘의 카드 완료!</div>
    <div class="empty-sub">매일 밤 10시에 새로운 인연들이<br>업데이트돼요 ✨<br><br>호감 목록에서 결과를 확인해보세요!</div>
  </div>

</div>

<!-- 매칭 팝업 -->
<div class="match-bg" id="matchBg">
  <div class="match-box">
    <div class="match-emoji">💕</div>
    <div class="match-title">매칭됐어요!</div>
    <div class="match-sub" id="matchSub"></div>
    <button class="match-btn-chat" onclick="goChat()">💬 지금 채팅하기</button>
    <button class="match-btn-later" onclick="closeMatch()">나중에 할게요</button>
  </div>
</div>

<!-- 네비 -->
<div class="nav">
  <button class="nv on" onclick="location.href='home.html'"><span class="nv-icon">🏠</span><span>홈</span></button>
  <button class="nv" onclick="location.href='likes.html'">
    <span class="nv-icon">💗</span><span>호감</span>
    <span class="nv-badge" id="navLikeBadge" style="display:none">0</span>
  </button>
  <button class="nv" onclick="location.href='chat.html'">
    <span class="nv-icon">💬</span><span>채팅</span>
    <span class="nv-badge" id="navChatBadge" style="display:none">0</span>
  </button>
  <button class="nv" onclick="location.href='profile.html'"><span class="nv-icon">👤</span><span>프로필</span></button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
var SB_URL='https://qnvmxvqqkazynsvjshvh.supabase.co';
var SB_KEY='sb_publishable_b7UCSfhHt6LhJ15zZT1h7g_BxkdFIJv';
var sb=supabase.createClient(SB_URL,SB_KEY);

var me=null, myProfile=null;
var allCards=[], filteredCards=[], shownCount=0;
var PAGE=6, currentTab='all', currentMatchId=null;
var photoSt={};

// 카운트다운
function updateCountdown(){
  var now=new Date();
  var target=new Date();
  target.setHours(22,0,0,0);
  if(now>=target) target.setDate(target.getDate()+1);
  var diff=target-now;
  var h=Math.floor(diff/3600000);
  var m=Math.floor((diff%3600000)/60000);
  var s=Math.floor((diff%60000)/1000);
  document.getElementById('countdown').textContent=
    String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
}
setInterval(updateCountdown,1000);
updateCountdown();

// 탭 전환
function switchTab(tab){
  currentTab=tab;
  ['all','date','meet'].forEach(function(t){
    document.getElementById('tab'+t.charAt(0).toUpperCase()+t.slice(1)).classList.toggle('active',t===tab);
  });
  applyFilter();
}

function applyFilter(){
  if(currentTab==='date') filteredCards=allCards.filter(function(p){return (p.type_pref||'').includes('소개팅');});
  else if(currentTab==='meet') filteredCards=allCards.filter(function(p){return (p.type_pref||'').includes('미팅');});
  else filteredCards=[...allCards];
  shownCount=0;
  renderCards(true);
}

// 초기화
async function init(){
  var r=await sb.auth.getSession();
  if(!r.data.session){window.location.href='index.html';return;}
  me=r.data.session.user;
  var pr=await sb.from('profiles').select('*').eq('id',me.id).single();
  myProfile=pr.data;

  if(!myProfile||!myProfile.name){window.location.href='profile.html';return;}

  if(!myProfile.is_approved){
    document.getElementById('loadingWrap').classList.remove('on');
    document.getElementById('reviewWrap').style.display='block';
    return;
  }

  await loadCards();
  checkUnread();
}

async function loadCards(){
  var target=myProfile.gender==='남성'?'여성':'남성';

  // 이미 반응한 유저
  var rr=await sb.from('reactions').select('to_user').eq('from_user',me.id);
  var doneIds=(rr.data||[]).map(function(r){return r.to_user;});
  doneIds.push(me.id);

  var q=sb.from('profiles').select('*').eq('gender',target).eq('is_approved',true);
  if(doneIds.length>0) q=q.not('id','in','('+doneIds.join(',')+')');
  var res=await q.order('created_at',{ascending:false}).limit(50);
  allCards=res.data||[];

  document.getElementById('loadingWrap').classList.remove('on');

  if(allCards.length===0){
    document.getElementById('emptyState').classList.add('on');
    return;
  }

  document.getElementById('cardSection').style.display='block';
  filteredCards=[...allCards];
  renderCards(true);
}

function renderCards(reset){
  var grid=document.getElementById('cardGrid');
  if(reset){grid.innerHTML='';shownCount=0;}

  var slice=filteredCards.slice(shownCount,shownCount+PAGE);
  if(!slice.length){
    document.getElementById('moreWrap').style.display='none';
    if(filteredCards.length===0) document.getElementById('emptyState').classList.add('on');
    return;
  }

  document.getElementById('emptyState').classList.remove('on');

  var gLabel=myProfile.gender==='남성'?'여성':'남성';
  document.getElementById('sectionTitle').textContent='오늘의 '+gLabel+' 💕';
  document.getElementById('sectionCount').textContent=filteredCards.length+'명';

  slice.forEach(function(p,i){grid.appendChild(buildCard(p,shownCount+i));});
  shownCount+=slice.length;

  var moreWrap=document.getElementById('moreWrap');
  if(shownCount<filteredCards.length){
    moreWrap.style.display='block';
    var btn=document.getElementById('moreBtn');
    btn.disabled=false; btn.textContent='💌 더 많은 인연 보기';
  } else moreWrap.style.display='none';
}

function showMore(){
  var btn=document.getElementById('moreBtn');
  btn.disabled=true; btn.textContent='불러오는 중...';
  setTimeout(function(){renderCards(false);},200);
}

function buildCard(p,idx){
  var card=document.createElement('div');
  card.className='pcard';
  card.id='pcard-'+p.id;
  card.style.animationDelay=(idx%PAGE*.06)+'s';

  var name=p.nickname||p.name||'익명';
  var school=p.school||'';
  var dept=p.department||'';
  var age=p.age?p.age+'살':'';
  var typeMap={'1:1(소개팅)':'💑','2:2(미팅)':'🎉 2:2','3:3(미팅)':'🎊 3:3','4:4(미팅)':'🎈 4:4'};
  var typeLabel=typeMap[p.type_pref]||'';

  // 태그
  var tags='';
  if(p.body_type) tags+='<span class="ptag">'+escH(p.body_type)+'</span>';
  if(p.age_pref) tags+='<span class="ptag purple">'+escH(p.age_pref)+'</span>';
  if(p.insta&&p.insta.length>1) tags+='<span class="ptag purple">📸 @'+escH(p.insta.replace('@',''))+'</span>';

  // 자기소개 (짧게)
  var bio=p.intro_line||p.bio||'';
  var shortBio=bio.length>30?bio.slice(0,28)+'…':bio;

  card.innerHTML=
    '<div class="pcard-photo" id="pp'+idx+'">'
    +buildPhoto(p.photo_url?[p.photo_url]:[],idx,p.gender)
    +(typeLabel?'<div class="pcard-type">'+typeLabel+'</div>':'')
    +'</div>'
    +'<div class="pcard-body">'
    +'<div class="pcard-name">'+escH(name)+'</div>'
    +'<div class="pcard-info">'+escH(school)+(dept?' · '+escH(dept):'')+(age?' · '+age:'')+'</div>'
    +(tags?'<div class="pcard-tags">'+tags+'</div>':'')
    +(shortBio?'<div style="font-size:11px;color:var(--muted);margin-bottom:8px;line-height:1.5;">'+escH(shortBio)+'</div>':'')
    +'<div class="pcard-btns">'
    +'<button class="btn-skip" onclick="doReact(\''+p.id+'\',\'skip\',event)">✕</button>'
    +'<button class="btn-like" onclick="doReact(\''+p.id+'\',\'like\',event)">💗 좋아요</button>'
    +'</div>'
    +'</div>';
  return card;
}

function buildPhoto(photos,idx,gender){
  if(!photos||!photos[0]){
    return '<div class="pcard-placeholder">'+(gender==='여성'?'👩':'👨')+'</div>';
  }
  if(photos.length===1)
    return '<img src="'+photos[0]+'" style="width:100%;height:100%;object-fit:cover" onerror="this.outerHTML=\'<div class=pcard-placeholder>🌸</div>\'">';
  photoSt[idx]=0;
  var imgs=photos.map(function(u,i){return '<img class="slide-img'+(i===0?' active':'')+'" src="'+u+'" data-i="'+i+'" onerror="this.style.display=\'none\'">';}).join('');
  var dots=photos.map(function(_,i){return '<button class="pdot'+(i===0?' active':'')+'" onclick="goPh('+idx+','+i+')"></button>';}).join('');
  return imgs+'<div class="pdot-wrap">'+dots+'</div>';
}

function goPh(wi,pi){
  photoSt[wi]=pi;
  var w=document.getElementById('pp'+wi);
  if(!w)return;
  w.querySelectorAll('.slide-img').forEach(function(img){img.classList.toggle('active',+img.dataset.i===pi);});
  w.querySelectorAll('.pdot').forEach(function(d,i){d.classList.toggle('active',i===pi);});
}

async function doReact(toId,action,e){
  e.stopPropagation();
  var card=document.getElementById('pcard-'+toId);
  if(card){card.style.transition='all .25s';card.style.opacity='0';card.style.transform='scale(.9)';setTimeout(function(){card.remove();},250);}

  await sb.from('reactions').upsert({from_user:me.id,to_user:toId,action:action},{onConflict:'from_user,to_user'});

  if(action==='like'){
    // 상대방에게 SMS 발송
    sendLikeNotification(toId);
    // 매칭 확인
    var mr=await sb.from('matches').select('*')
      .or('user1.eq.'+me.id+'.and.user2.eq.'+toId+',user1.eq.'+toId+'.and.user2.eq.'+me.id)
      .single();
    if(mr.data){
      var pname=allCards.find(function(p){return p.id===toId;});
      var displayName=pname?(pname.nickname||pname.name):'상대방';
      currentMatchId=mr.data.id;
      document.getElementById('matchSub').textContent=displayName+'님도 나에게 관심이 있어요! 지금 채팅을 시작해보세요 💌';
      document.getElementById('matchBg').classList.add('on');
    }
  }
}

function goChat(){if(currentMatchId)window.location.href='chat.html?match='+currentMatchId;}
function closeMatch(){document.getElementById('matchBg').classList.remove('on');}

async function checkUnread(){
  var r=await sb.from('messages').select('*',{count:'exact',head:true}).eq('is_read',false).neq('sender_id',me.id);
  if(r.count>0){
    var b=document.getElementById('chatBadge');b.textContent=r.count>9?'9+':r.count;b.style.display='flex';
    var nb=document.getElementById('navChatBadge');if(nb){nb.textContent=r.count>9?'9+':r.count;nb.style.display='flex';}
  }
  // 받은 호감
  var lr=await sb.from('reactions').select('*',{count:'exact',head:true})
    .eq('to_user',me.id).eq('action','like')
    .gt('expires_at',new Date().toISOString());
  if(lr.count>0){
    var lb=document.getElementById('navLikeBadge');
    if(lb){lb.textContent=lr.count>9?'9+':lr.count;lb.style.display='flex';}
  }
}

function escH(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}



async function sendLikeNotification(toUserId){
  try {
    // 받은 사람 프로필 가져오기
    var pr = await sb.from('profiles').select('phone, nickname, name').eq('id', toUserId).single();
    if(!pr.data || !pr.data.phone) return;

    var senderName = myProfile.nickname || myProfile.name || '누군가';
    var smsText = '[Blink ✨] '+senderName+'님이 회원님에게 호감을 보냈어요! 💗\n앱에서 확인해보세요\nhttps://woong861.github.io/blink';

    await fetch(SB_URL + '/functions/v1/send-sms', {
      method: 'POST',
      headers: {
        'Authorization': 'Bearer ' + SB_KEY,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ to: pr.data.phone, text: smsText })
    });
  } catch(err) {
    console.log('SMS 발송 실패:', err);
  }
}

init();
</script>
