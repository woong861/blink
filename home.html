<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Blink — 오늘의 카드</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#FF6B9D">
<meta name="apple-mobile-web-app-capable" content="yes">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --pink:#FF6B9D; --pink-light:#FFB3CC; --pink-pale:#FFF0F5;
    --purple:#8B5CF6; --purple-light:#C4B5FD; --purple-pale:#F5F3FF;
    --bg:#FFF8FC; --card-bg:#FFFFFF; --text:#1C0A16; --text-muted:#9B6B80;
    --border:rgba(255,107,157,0.18);
    --shadow:0 8px 40px rgba(255,107,157,0.2);
    --nav-h:70px;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { font-family:-apple-system,sans-serif; background:var(--bg); min-height:100vh; overflow-x:hidden; }

  /* 상단 헤더 */
  .header {
    position:fixed; top:0; left:0; right:0;
    height:60px; background:rgba(255,248,252,0.95);
    backdrop-filter:blur(10px); z-index:100;
    display:flex; align-items:center; justify-content:space-between;
    padding:0 20px; border-bottom:1px solid var(--border);
  }
  .header-logo { font-size:22px; font-weight:800; background:linear-gradient(135deg,#FF6B9D,#8B5CF6); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
  .header-icons { display:flex; gap:12px; }
  .header-icon { width:36px; height:36px; border-radius:50%; border:none; background:var(--pink-pale); color:var(--pink); font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center; position:relative; }
  .badge { position:absolute; top:-2px; right:-2px; width:16px; height:16px; background:var(--pink); border-radius:50%; font-size:9px; color:white; display:flex; align-items:center; justify-content:center; font-weight:700; }

  /* 메인 */
  .main { padding:76px 20px calc(var(--nav-h) + 20px); min-height:100vh; }

  /* 날짜/인사 */
  .greeting { margin-bottom:20px; }
  .greeting-date { font-size:12px; color:var(--text-muted); margin-bottom:4px; }
  .greeting-text { font-size:20px; font-weight:700; color:var(--text); }
  .greeting-text span { color:var(--pink); }

  /* 카드 스택 */
  .card-area { position:relative; height:520px; margin-bottom:24px; }

  .profile-card {
    position:absolute; inset:0;
    background:var(--card-bg); border-radius:24px;
    box-shadow:var(--shadow); overflow:hidden;
    cursor:grab; user-select:none;
    transition:transform .15s ease;
    border:1px solid var(--border);
  }
  .profile-card:active { cursor:grabbing; }
  .profile-card.next-card {
    transform:scale(0.94) translateY(16px);
    z-index:1; pointer-events:none;
  }
  .profile-card.current-card { z-index:2; }
  .profile-card.swiping-right { border-color:#4CAF50; box-shadow:0 8px 40px rgba(76,175,80,0.3); }
  .profile-card.swiping-left { border-color:#f44336; box-shadow:0 8px 40px rgba(244,67,54,0.3); }

  /* 카드 사진 */
  .card-img { width:100%; height:340px; object-fit:cover; display:block; }
  .card-img-placeholder { width:100%; height:340px; background:linear-gradient(135deg,var(--pink-pale),var(--purple-pale)); display:flex; align-items:center; justify-content:center; font-size:72px; }

  /* 스와이프 표시 */
  .swipe-indicator {
    position:absolute; top:24px; padding:8px 20px;
    border-radius:50px; font-size:18px; font-weight:800;
    border:3px solid; opacity:0; transition:opacity .1s;
  }
  .swipe-indicator.like { left:20px; color:#4CAF50; border-color:#4CAF50; transform:rotate(-15deg); }
  .swipe-indicator.skip { right:20px; color:#f44336; border-color:#f44336; transform:rotate(15deg); }

  /* 카드 정보 */
  .card-info { padding:16px 20px 20px; }
  .card-name-row { display:flex; align-items:baseline; gap:8px; margin-bottom:6px; }
  .card-name { font-size:22px; font-weight:700; color:var(--text); }
  .card-age { font-size:15px; color:var(--text-muted); }
  .card-school { display:inline-flex; align-items:center; gap:4px; background:var(--purple-pale); border:1px solid var(--purple-light); border-radius:6px; padding:3px 10px; font-size:12px; color:var(--purple); margin-bottom:10px; }
  .card-bio { font-size:13.5px; color:#555; line-height:1.7; }
  .type-badge { position:absolute; top:16px; left:16px; background:rgba(255,255,255,.92); border-radius:50px; padding:4px 12px; font-size:12px; color:var(--pink); font-weight:600; border:1px solid var(--pink-light); }

  /* 액션 버튼 */
  .action-btns { display:flex; justify-content:center; align-items:center; gap:20px; }
  .action-btn {
    width:60px; height:60px; border-radius:50%; border:none;
    font-size:24px; cursor:pointer; transition:all .2s;
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 4px 16px rgba(0,0,0,0.12);
  }
  .action-btn:active { transform:scale(0.9); }
  .btn-skip { background:white; color:#f44336; }
  .btn-like { background:linear-gradient(135deg,var(--pink),var(--purple)); color:white; width:70px; height:70px; font-size:28px; box-shadow:0 6px 20px rgba(255,107,157,.4); }
  .btn-super { background:white; color:#2196F3; }

  /* 빈 상태 */
  .empty-state { display:none; text-align:center; padding:60px 20px; }
  .empty-state.visible { display:block; }
  .empty-emoji { font-size:60px; margin-bottom:16px; }
  .empty-title { font-size:20px; font-weight:700; color:var(--text); margin-bottom:8px; }
  .empty-sub { font-size:14px; color:var(--text-muted); line-height:1.6; }

  /* 로딩 */
  .loading-wrap { display:none; text-align:center; padding:80px 20px; }
  .loading-wrap.visible { display:block; }
  .loading-hearts { display:flex; justify-content:center; gap:8px; margin-bottom:16px; }
  .lh { width:14px; height:14px; background:var(--pink); border-radius:50% 50% 50% 0/60% 60% 40% 40%; transform:rotate(-45deg); animation:hb 1.2s ease-in-out infinite; }
  .lh:nth-child(2){animation-delay:.2s}.lh:nth-child(3){animation-delay:.4s}
  @keyframes hb{0%,80%,100%{transform:rotate(-45deg) scale(.8);opacity:.5}40%{transform:rotate(-45deg) scale(1.3);opacity:1}}

  /* 매칭 팝업 */
  .match-overlay {
    display:none; position:fixed; inset:0; z-index:200;
    background:rgba(0,0,0,0.7); align-items:center; justify-content:center;
    backdrop-filter:blur(4px);
  }
  .match-overlay.visible { display:flex; }
  .match-popup {
    background:white; border-radius:28px; padding:36px 28px;
    text-align:center; max-width:320px; width:90%;
    animation:popIn .4s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes popIn { from{transform:scale(.7);opacity:0} to{transform:scale(1);opacity:1} }
  .match-emoji { font-size:60px; margin-bottom:12px; }
  .match-title { font-size:26px; font-weight:800; background:linear-gradient(135deg,var(--pink),var(--purple)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; margin-bottom:8px; }
  .match-sub { font-size:14px; color:var(--text-muted); margin-bottom:24px; line-height:1.6; }
  .match-btns { display:flex; flex-direction:column; gap:10px; }
  .btn-match-chat { padding:14px; border-radius:50px; border:none; background:linear-gradient(135deg,var(--pink),var(--purple)); color:white; font-size:15px; font-weight:700; cursor:pointer; font-family:inherit; }
  .btn-match-later { padding:14px; border-radius:50px; border:1.5px solid var(--border); background:none; color:var(--text-muted); font-size:15px; cursor:pointer; font-family:inherit; }

  /* 하단 네비 */
  .nav {
    position:fixed; bottom:0; left:0; right:0;
    height:var(--nav-h); background:rgba(255,248,252,0.97);
    backdrop-filter:blur(10px); border-top:1px solid var(--border);
    display:flex; align-items:center; justify-content:space-around;
    padding-bottom:env(safe-area-inset-bottom);
    z-index:100;
  }
  .nav-item { display:flex; flex-direction:column; align-items:center; gap:4px; padding:8px 20px; border:none; background:none; cursor:pointer; color:var(--text-muted); font-size:10px; font-family:inherit; transition:color .2s; }
  .nav-item.active { color:var(--pink); }
  .nav-icon { font-size:22px; }
  .nav-item.active .nav-icon { transform:scale(1.1); }
</style>
</head>
<body>

<!-- 헤더 -->
<div class="header">
  <div class="header-logo">Blink ✨</div>
  <div class="header-icons">
    <button class="header-icon" onclick="location.href='chat.html'" title="채팅">
      💬
      <span class="badge" id="chatBadge" style="display:none">0</span>
    </button>
    <button class="header-icon" onclick="location.href='profile.html'" title="프로필">👤</button>
  </div>
</div>

<!-- 메인 -->
<div class="main">
  <div class="greeting">
    <div class="greeting-date" id="greetingDate"></div>
    <div class="greeting-text">오늘의 <span>새로운 인연</span>이에요 💕</div>
  </div>

  <!-- 로딩 -->
  <div class="loading-wrap visible" id="loadingWrap">
    <div class="loading-hearts"><div class="lh"></div><div class="lh"></div><div class="lh"></div></div>
    <p style="color:var(--text-muted);font-size:14px;">오늘의 인연을 찾고 있어요...</p>
  </div>

  <!-- 카드 영역 -->
  <div id="cardArea" style="display:none">
    <div class="card-area" id="cardStack"></div>
    <div class="action-btns">
      <button class="action-btn btn-skip" onclick="swipe('skip')" title="스킵">✕</button>
      <button class="action-btn btn-like" onclick="swipe('like')" title="좋아요">💗</button>
      <button class="action-btn btn-super" onclick="swipe('super')" title="슈퍼좋아요">⭐</button>
    </div>
  </div>

  <!-- 빈 상태 -->
  <div class="empty-state" id="emptyState">
    <div class="empty-emoji">🌙</div>
    <div class="empty-title">오늘의 카드 완료!</div>
    <div class="empty-sub">매일 밤 10시에 새로운 인연들이<br>업데이트돼요 ✨</div>
  </div>
</div>

<!-- 매칭 팝업 -->
<div class="match-overlay" id="matchOverlay">
  <div class="match-popup">
    <div class="match-emoji">💕</div>
    <div class="match-title">매칭됐어요!</div>
    <div class="match-sub" id="matchSubText"></div>
    <div class="match-btns">
      <button class="btn-match-chat" onclick="goToChat()">💬 채팅하러 가기</button>
      <button class="btn-match-later" onclick="closeMatch()">나중에 할게요</button>
    </div>
  </div>
</div>

<!-- 하단 네비 -->
<div class="nav">
  <button class="nav-item active" onclick="location.href='home.html'">
    <span class="nav-icon">🏠</span>
    <span>홈</span>
  </button>
  <button class="nav-item" onclick="location.href='chat.html'">
    <span class="nav-icon">💬</span>
    <span>채팅</span>
  </button>
  <button class="nav-item" onclick="location.href='profile.html'">
    <span class="nav-icon">👤</span>
    <span>프로필</span>
  </button>
</div>

<script>
const SUPABASE_URL = 'https://qnvmxvqqkazynsvjshvh.supabase.co';
const SUPABASE_KEY = 'sb_publishable_b7UCSfhHt6LhJ15zZT1h7g_BxkdFIJv';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentUser = null;
let myProfile = null;
let cards = [];
let currentIdx = 0;
let currentMatchId = null;
let isDragging = false, startX = 0, startY = 0, currentX = 0;

// 날짜
const now = new Date();
document.getElementById('greetingDate').textContent =
  now.getFullYear() + '년 ' + (now.getMonth()+1) + '월 ' + now.getDate() + '일';

// 초기화
async function init() {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { window.location.href = 'index.html'; return; }
  currentUser = session.user;

  // 내 프로필
  const { data: profile } = await sb.from('profiles').select('*').eq('id', currentUser.id).single();
  myProfile = profile;
  if (!myProfile) { window.location.href = 'profile.html'; return; }

  await loadCards();
  checkUnreadMessages();
}

// 카드 로드
async function loadCards() {
  const targetGender = myProfile.gender === '남성' ? '여성' : '남성';

  // 이미 반응한 유저 제외
  const { data: reacted } = await sb.from('reactions').select('to_user').eq('from_user', currentUser.id);
  const reactedIds = (reacted || []).map(r => r.to_user);
  reactedIds.push(currentUser.id);

  let query = sb.from('profiles')
    .select('*')
    .eq('gender', targetGender)
    .eq('is_approved', true);

  if (reactedIds.length > 0) {
    query = query.not('id', 'in', '(' + reactedIds.join(',') + ')');
  }

  const { data } = await query.limit(20);
  cards = data || [];

  document.getElementById('loadingWrap').classList.remove('visible');

  if (cards.length === 0) {
    document.getElementById('emptyState').classList.add('visible');
  } else {
    document.getElementById('cardArea').style.display = 'block';
    renderCards();
  }
}

// 카드 렌더링
function renderCards() {
  const stack = document.getElementById('cardStack');
  stack.innerHTML = '';

  // 다음 카드 (뒤에)
  if (currentIdx + 1 < cards.length) {
    const nextCard = buildCard(cards[currentIdx + 1], false);
    stack.appendChild(nextCard);
  }

  // 현재 카드 (앞에)
  if (currentIdx < cards.length) {
    const card = buildCard(cards[currentIdx], true);
    setupSwipe(card);
    stack.appendChild(card);
  }
}

function buildCard(p, isCurrent) {
  const card = document.createElement('div');
  card.className = 'profile-card ' + (isCurrent ? 'current-card' : 'next-card');

  const typeMap = {'1:1(소개팅)':'💑 소개팅','2:2(미팅)':'🎉 2:2','3:3(미팅)':'🎊 3:3'};
  const typeLabel = typeMap[p.type_pref] || '';
  const photoHtml = p.photo_url
    ? '<img class="card-img" src="' + p.photo_url + '" alt="프로필">'
    : '<div class="card-img-placeholder">' + (p.gender==='여성'?'👩':'👨') + '</div>';

  card.innerHTML =
    photoHtml +
    (typeLabel ? '<div class="type-badge">' + typeLabel + '</div>' : '') +
    '<div class="swipe-indicator like">💚 LIKE</div>' +
    '<div class="swipe-indicator skip">✕ SKIP</div>' +
    '<div class="card-info">' +
    '<div class="card-name-row"><span class="card-name">' + escH(p.name) + '</span><span class="card-age">' + (p.age||'') + '살</span></div>' +
    (p.school ? '<span class="card-school">🏫 ' + escH(p.school) + (p.department ? ' · ' + escH(p.department) : '') + '</span>' : '') +
    (p.bio ? '<p class="card-bio">' + escH(p.bio) + '</p>' : '') +
    '</div>';

  return card;
}

// 스와이프 설정
function setupSwipe(card) {
  card.addEventListener('mousedown', dragStart);
  card.addEventListener('touchstart', dragStart, {passive:true});
  document.addEventListener('mousemove', dragging);
  document.addEventListener('touchmove', dragging, {passive:true});
  document.addEventListener('mouseup', dragEnd);
  document.addEventListener('touchend', dragEnd);
}

function dragStart(e) {
  isDragging = true;
  const pt = e.touches ? e.touches[0] : e;
  startX = pt.clientX; startY = pt.clientY; currentX = 0;
}

function dragging(e) {
  if (!isDragging) return;
  const pt = e.touches ? e.touches[0] : e;
  currentX = pt.clientX - startX;
  const currentY = pt.clientY - startY;
  const card = document.querySelector('.current-card');
  if (!card) return;
  const rotate = currentX * 0.1;
  card.style.transform = 'translateX(' + currentX + 'px) translateY(' + currentY*0.3 + 'px) rotate(' + rotate + 'deg)';

  // 방향 표시
  const likeEl = card.querySelector('.swipe-indicator.like');
  const skipEl = card.querySelector('.swipe-indicator.skip');
  if (currentX > 40) {
    likeEl.style.opacity = Math.min((currentX-40)/60, 1);
    skipEl.style.opacity = 0;
    card.classList.add('swiping-right'); card.classList.remove('swiping-left');
  } else if (currentX < -40) {
    skipEl.style.opacity = Math.min((-currentX-40)/60, 1);
    likeEl.style.opacity = 0;
    card.classList.add('swiping-left'); card.classList.remove('swiping-right');
  } else {
    likeEl.style.opacity = 0; skipEl.style.opacity = 0;
    card.classList.remove('swiping-right','swiping-left');
  }
}

function dragEnd() {
  if (!isDragging) return;
  isDragging = false;
  const card = document.querySelector('.current-card');
  if (!card) return;
  document.removeEventListener('mousemove', dragging);
  document.removeEventListener('touchmove', dragging);
  document.removeEventListener('mouseup', dragEnd);
  document.removeEventListener('touchend', dragEnd);

  if (currentX > 80) {
    flyOut(card, 'right'); setTimeout(() => swipe('like'), 200);
  } else if (currentX < -80) {
    flyOut(card, 'left'); setTimeout(() => swipe('skip'), 200);
  } else {
    card.style.transition = 'transform .3s ease';
    card.style.transform = '';
    setTimeout(() => card.style.transition = '', 300);
  }
}

function flyOut(card, dir) {
  card.style.transition = 'transform .4s ease, opacity .4s ease';
  card.style.transform = 'translateX(' + (dir==='right'?800:-800) + 'px) rotate(' + (dir==='right'?30:-30) + 'deg)';
  card.style.opacity = '0';
}

// 버튼으로 스와이프
async function swipe(action) {
  if (currentIdx >= cards.length) return;
  const card = cards[currentIdx];
  const cardEl = document.querySelector('.current-card');
  if (cardEl && action !== 'skip') {
    flyOut(cardEl, action === 'like' || action === 'super' ? 'right' : 'left');
  } else if (cardEl) {
    flyOut(cardEl, 'left');
  }

  // DB에 반응 저장
  const { error } = await sb.from('reactions').insert({
    from_user: currentUser.id,
    to_user: card.id,
    action: action === 'super' ? 'like' : action
  });

  if (!error) {
    // 매칭 확인
    const { data: match } = await sb.from('matches')
      .select('*')
      .or('user1.eq.' + currentUser.id + ',user2.eq.' + currentUser.id)
      .or('user1.eq.' + card.id + ',user2.eq.' + card.id)
      .single();

    if (match) {
      currentMatchId = match.id;
      document.getElementById('matchSubText').textContent =
        card.name + '님도 나에게 관심이 있어요! 지금 대화를 시작해보세요 💌';
      document.getElementById('matchOverlay').classList.add('visible');
    }
  }

  currentIdx++;
  setTimeout(() => {
    if (currentIdx >= cards.length) {
      document.getElementById('cardArea').style.display = 'none';
      document.getElementById('emptyState').classList.add('visible');
    } else {
      renderCards();
    }
  }, 300);
}

function goToChat() {
  if (currentMatchId) window.location.href = 'chat.html?match=' + currentMatchId;
}
function closeMatch() {
  document.getElementById('matchOverlay').classList.remove('visible');
}

// 안 읽은 메시지 확인
async function checkUnreadMessages() {
  const { count } = await sb.from('messages')
    .select('*', {count:'exact',head:true})
    .eq('is_read', false)
    .neq('sender_id', currentUser.id);

  if (count > 0) {
    const badge = document.getElementById('chatBadge');
    badge.textContent = count > 9 ? '9+' : count;
    badge.style.display = 'flex';
  }
}

function escH(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

init();
</script>
</body>
</html>
