<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Blink — 채팅</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Noto+Serif+KR:wght@400;600&display=swap" rel="stylesheet">
<meta name="theme-color" content="#FF6B9D">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<style>
:root{
  --pink:#FF6B9D;--pink-light:#FFB3CC;--pink-pale:#FFF0F5;
  --purple:#8B5CF6;--purple-light:#C4B5FD;--purple-pale:#F5F3FF;
  --bg:#FFF8FC;--text:#1C0A16;--muted:#9B6B80;
  --border:rgba(255,107,157,0.18);--nav:70px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Gowun Dodum',sans-serif;background:var(--bg);min-height:100vh;color:var(--text);}

.hd{position:fixed;top:0;left:0;right:0;height:56px;background:rgba(255,248,252,.97);backdrop-filter:blur(12px);z-index:100;display:flex;align-items:center;padding:0 18px;border-bottom:1px solid var(--border);}
.hd-title{font-size:17px;font-weight:700;}
.back-btn{background:none;border:none;font-size:20px;cursor:pointer;padding:4px;color:var(--text);}

.match-list{padding:72px 0 calc(var(--nav) + 20px);}
.mitem{display:flex;align-items:center;gap:12px;padding:14px 18px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s;background:white;}
.mitem:active{background:var(--pink-pale);}
.mavt{width:52px;height:52px;border-radius:50%;background:var(--pink-pale);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;border:2px solid var(--pink-light);overflow:hidden;}
.mavt img{width:52px;height:52px;border-radius:50%;object-fit:cover;}
.minfo{flex:1;min-width:0;}
.mname{font-size:15px;font-weight:700;margin-bottom:3px;}
.mlast{font-size:13px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.mmeta{display:flex;flex-direction:column;align-items:flex-end;gap:4px;}
.mtime{font-size:11px;color:var(--muted);}
.unread{background:var(--pink);color:white;border-radius:50px;padding:2px 8px;font-size:10px;font-weight:700;}

.empty{display:none;text-align:center;padding:80px 20px;}
.empty.visible{display:block;}
.empty-emoji{font-size:50px;margin-bottom:14px;}
.empty-title{font-size:17px;font-weight:700;margin-bottom:6px;}
.empty-sub{font-size:13px;color:var(--muted);line-height:1.6;}
.btn-go{margin-top:18px;padding:12px 28px;background:linear-gradient(135deg,var(--pink),var(--purple));color:white;border:none;border-radius:50px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;}

/* 채팅방 */
.chatroom{display:none;position:fixed;inset:0;background:var(--bg);z-index:200;flex-direction:column;}
.chatroom.visible{display:flex;}
.chat-hd{height:56px;background:rgba(255,248,252,.97);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;padding:0 14px;flex-shrink:0;}
.chat-avt{width:36px;height:36px;border-radius:50%;background:var(--pink-pale);display:flex;align-items:center;justify-content:center;font-size:18px;overflow:hidden;flex-shrink:0;}
.chat-avt img{width:36px;height:36px;object-fit:cover;border-radius:50%;}
.chat-pname{font-size:15px;font-weight:700;}
.chat-msgs{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:8px;}
.mw{display:flex;align-items:flex-end;gap:6px;}
.mw.mine{flex-direction:row-reverse;}
.bub{max-width:72%;padding:9px 13px;border-radius:16px;font-size:14px;line-height:1.5;word-break:break-word;}
.bub.theirs{background:white;border:1px solid var(--border);border-bottom-left-radius:4px;}
.bub.mine{background:linear-gradient(135deg,var(--pink),var(--purple));color:white;border-bottom-right-radius:4px;}
.mt{font-size:10px;color:var(--muted);flex-shrink:0;}
.chat-in{padding:10px 14px;background:rgba(255,248,252,.97);border-top:1px solid var(--border);display:flex;gap:8px;align-items:flex-end;padding-bottom:calc(10px + env(safe-area-inset-bottom));}
.chat-input{flex:1;padding:10px 14px;border-radius:20px;border:1.5px solid var(--border);background:white;font-size:14px;outline:none;font-family:inherit;resize:none;max-height:80px;line-height:1.5;}
.chat-input:focus{border-color:var(--pink);}
.send-btn{width:38px;height:38px;background:linear-gradient(135deg,var(--pink),var(--purple));border:none;border-radius:50%;color:white;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}

.loading-txt{text-align:center;padding:40px;color:var(--muted);font-size:14px;}

.nav{position:fixed;bottom:0;left:0;right:0;height:var(--nav);background:rgba(255,248,252,.97);backdrop-filter:blur(12px);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-around;padding-bottom:env(safe-area-inset-bottom);z-index:100;}
.nv{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 14px;border:none;background:none;cursor:pointer;color:var(--muted);font-size:10px;font-family:inherit;position:relative;}
.nv.on{color:var(--pink);}
.nv-icon{font-size:21px;}
.nv-badge{position:absolute;top:2px;right:8px;min-width:14px;height:14px;background:var(--pink);border-radius:50px;font-size:9px;color:white;display:flex;align-items:center;justify-content:center;font-weight:700;padding:0 3px;}
</style>
</head>
<body>

<div class="hd">
  <div class="hd-title">💬 채팅</div>
</div>

<div id="listView">
  <div id="loadingText" class="loading-txt">불러오는 중...</div>
  <div class="match-list" id="matchList"></div>
  <div class="empty" id="emptyState">
    <div class="empty-emoji">💌</div>
    <div class="empty-title">아직 매칭이 없어요</div>
    <div class="empty-sub">호감을 주고 받으면<br>여기서 대화할 수 있어요!</div>
    <button class="btn-go" onclick="location.href='home.html'">카드 보러가기</button>
  </div>
</div>

<!-- 채팅방 -->
<div class="chatroom" id="chatroom">
  <div class="chat-hd">
    <button class="back-btn" onclick="closeChat()">←</button>
    <div class="chat-avt" id="chatAvatar">👤</div>
    <div class="chat-pname" id="chatPartner"></div>
  </div>
  <div class="chat-msgs" id="chatMessages"></div>
  <div class="chat-in">
    <textarea class="chat-input" id="chatInput" placeholder="메시지 입력..." rows="1" onkeydown="hKey(event)"></textarea>
    <button class="send-btn" onclick="sendMsg()">➤</button>
  </div>
</div>

<div class="nav" id="mainNav">
  <button class="nv" onclick="location.href='home.html'"><span class="nv-icon">🏠</span><span>홈</span></button>
  <button class="nv" onclick="location.href='likes.html'">
    <span class="nv-icon">💗</span><span>호감</span>
    <span class="nv-badge" id="navLikeBadge" style="display:none">0</span>
  </button>
  <button class="nv on" onclick="location.href='chat.html'"><span class="nv-icon">💬</span><span>채팅</span></button>
  <button class="nv" onclick="location.href='profile.html'"><span class="nv-icon">👤</span><span>프로필</span></button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
var SB_URL='https://qnvmxvqqkazynsvjshvh.supabase.co';
var SB_KEY='sb_publishable_b7UCSfhHt6LhJ15zZT1h7g_BxkdFIJv';
var sb=supabase.createClient(SB_URL,SB_KEY);
var me=null,currentMatchId=null,rtCh=null;

async function init(){
  var r=await sb.auth.getSession();
  if(!r.data.session){window.location.href='index.html';return;}
  me=r.data.session.user;
  await loadMatches();
  updateBadge();
  var p=new URLSearchParams(window.location.search);
  var mid=p.get('match');
  if(mid) openChat(mid);
}

async function loadMatches(){
  var r=await sb.from('matches').select('*')
    .or('user1.eq.'+me.id+',user2.eq.'+me.id)
    .order('created_at',{ascending:false});

  document.getElementById('loadingText').style.display='none';

  if(!r.data||r.data.length===0){
    document.getElementById('emptyState').classList.add('visible');
    return;
  }

  var list=document.getElementById('matchList');
  list.innerHTML='';

  for(var i=0;i<r.data.length;i++){
    var m=r.data[i];
    var pid=m.user1===me.id?m.user2:m.user1;
    var pr=await sb.from('profiles').select('*').eq('id',pid).single();
    if(!pr.data) continue;
    var p=pr.data;

    var lr=await sb.from('messages').select('*').eq('match_id',m.id)
      .order('created_at',{ascending:false}).limit(1);
    var last=(lr.data||[])[0];

    var ur=await sb.from('messages').select('*',{count:'exact',head:true})
      .eq('match_id',m.id).eq('is_read',false).neq('sender_id',me.id);
    var unread=ur.count||0;

    var avatarH=p.photo_url?'<img src="'+p.photo_url+'">':(p.gender==='여성'?'👩':'👨');
    var time=last?formatTime(last.created_at):formatTime(m.created_at);

    (function(matchId,profile){
      var item=document.createElement('div');
      item.className='mitem';
      item.onclick=function(){openChat(matchId,profile);};
      item.innerHTML=
        '<div class="mavt">'+avatarH+'</div>'
        +'<div class="minfo">'
        +'<div class="mname">'+escH(profile.nickname||profile.name||'익명')+'</div>'
        +'<div class="mlast">'+escH(last?last.content:'매칭됐어요! 대화를 시작해보세요 💕')+'</div>'
        +'</div>'
        +'<div class="mmeta">'
        +'<div class="mtime">'+time+'</div>'
        +(unread>0?'<div class="unread">'+unread+'</div>':'')
        +'</div>';
      list.appendChild(item);
    })(m.id,p);
  }
}

async function openChat(matchId,partner){
  currentMatchId=matchId;
  if(!partner){
    var mr=await sb.from('matches').select('*').eq('id',matchId).single();
    if(mr.data){
      var pid=mr.data.user1===me.id?mr.data.user2:mr.data.user1;
      var pp=await sb.from('profiles').select('*').eq('id',pid).single();
      partner=pp.data;
    }
  }

  document.getElementById('chatPartner').textContent=partner?(partner.nickname||partner.name||''):'';
  var av=document.getElementById('chatAvatar');
  if(partner&&partner.photo_url) av.innerHTML='<img src="'+partner.photo_url+'">';
  else av.textContent=partner?(partner.gender==='여성'?'👩':'👨'):'👤';

  document.getElementById('chatroom').classList.add('visible');
  document.getElementById('mainNav').style.display='none';

  await loadMsgs();
  await sb.from('messages').update({is_read:true}).eq('match_id',matchId).neq('sender_id',me.id);

  if(rtCh) sb.removeChannel(rtCh);
  rtCh=sb.channel('c-'+matchId)
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'messages',filter:'match_id=eq.'+matchId},function(p){
      appendMsg(p.new); scrollBottom();
    }).subscribe();
}

async function loadMsgs(){
  var r=await sb.from('messages').select('*').eq('match_id',currentMatchId)
    .order('created_at',{ascending:true});
  var c=document.getElementById('chatMessages');
  c.innerHTML='';
  (r.data||[]).forEach(function(m){appendMsg(m);});
  scrollBottom();
}

function appendMsg(m){
  var mine=m.sender_id===me.id;
  var c=document.getElementById('chatMessages');
  var w=document.createElement('div');
  w.className='mw'+(mine?' mine':'');
  w.innerHTML='<div class="bub '+(mine?'mine':'theirs')+'">'+escH(m.content)+'</div>'
             +'<div class="mt">'+formatTime(m.created_at)+'</div>';
  c.appendChild(w);
}

async function sendMsg(){
  var ip=document.getElementById('chatInput');
  var t=ip.value.trim();
  if(!t||!currentMatchId) return;
  ip.value=''; ip.style.height='auto';
  await sb.from('messages').insert({match_id:currentMatchId,sender_id:me.id,content:t});
}

function hKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}}

function closeChat(){
  document.getElementById('chatroom').classList.remove('visible');
  document.getElementById('mainNav').style.display='flex';
  if(rtCh) sb.removeChannel(rtCh);
  loadMatches();
  history.replaceState({},'','chat.html');
}

function scrollBottom(){
  var el=document.getElementById('chatMessages');
  setTimeout(function(){el.scrollTop=el.scrollHeight;},100);
}

function formatTime(ts){
  var d=new Date(ts), now=new Date(), diff=now-d;
  if(diff<60000) return '방금';
  if(diff<3600000) return Math.floor(diff/60000)+'분 전';
  if(diff<86400000) return d.getHours()+':'+String(d.getMinutes()).padStart(2,'0');
  return (d.getMonth()+1)+'/'+d.getDate();
}

async function updateBadge(){
  var lr=await sb.from('reactions').select('*',{count:'exact',head:true})
    .eq('to_user',me.id).eq('action','like')
    .gt('expires_at',new Date().toISOString());
  if(lr.count>0){
    var lb=document.getElementById('navLikeBadge');
    lb.textContent=lr.count>9?'9+':lr.count;
    lb.style.display='flex';
  }
}

function escH(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

init();
</script>
</body>
</html>
